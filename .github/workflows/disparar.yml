name: Disparar na VPS

on:
  workflow_dispatch:          # botão manual no Actions
  # schedule:                 # opcional: dias/horários fixos (cron em UTC)
  #   - cron: '50 23 * * 4'   # ex.: 20:50 BRT na quinta = 23:50 UTC

jobs:
  disparar:
    runs-on: ubuntu-latest
    steps:
      - name: SSH na VPS e dispara o bot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: systemctl restart bot